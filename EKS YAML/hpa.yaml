apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dilwl-campus-4122-hpa-v1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dilwl-campus-4122-v1
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

