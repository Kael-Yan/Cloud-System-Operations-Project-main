version: '3.8'

services:
  app:
    build: .
    container_name: hkgolden-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=microblog.py
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-east-1}
      - DYNAMODB_ENDPOINT=${DYNAMODB_ENDPOINT:-}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hkgolden-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

networks:
  hkgolden-network:
    driver: bridge 